<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Grocery Waste Predictor</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>
</head>
<body data-theme="light">
  <div class="auth-container">
    <div class="auth-box">
      <h2>Welcome Back</h2>
      <p class="subtitle">Log in to manage inventory and food donations</p>
      
      <form id="loginForm">
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" id="username" placeholder="Username" required />
        </div>
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="Password" required />
        </div>
        <button type="submit" class="btn-primary">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
      </form>
      
      <p class="redirect-text">Don't have an account? <a href="register.html">Register here</a></p>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      
      let icon = 'fa-check-circle';
      if (type === 'warning') icon = 'fa-exclamation-triangle';
      if (type === 'danger') icon = 'fa-times-circle';
      
      toast.innerHTML = `
        <i class="fas ${icon} toast-icon"></i>
        <span class="toast-message">${message}</span>
      `;
      
      container.appendChild(toast);
      
      setTimeout(() => toast.classList.add('show'), 50);
      
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 400);
      }, 4000);
    }

    document.getElementById("loginForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        const response = await fetch("http://127.0.0.1:8000/api/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password })
        });

        if (!response.ok) {
          const error = await response.json();
          showToast(error.detail || "Invalid credentials", "danger");
          return;
        }

        const data = await response.json();
        
        // Save session information
        localStorage.setItem("loggedInUser", data.username);
        localStorage.setItem("userId", data.user_id);
        
        showToast("Login Successful! Welcome back.", "success");
        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 1200);

      } catch (err) {
        showToast("Could not connect to the server. Is the backend running?", "danger");
        console.error(err);
      }
    });
  </script>
</body>
</html>
